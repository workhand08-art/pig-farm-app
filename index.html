<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลสุกร</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; margin-top: 25px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐷 บันทึกข้อมูลสุกร</h2>
    
    <label>วันที่ตรวจ</label>
    <input type="date" id="checkDate">

    <label>เบอร์หู/รหัสสัตว์</label>
    <input type="text" id="pigID" placeholder="ตัวอย่าง: PIG001">

    <label>คอกที่</label>
    <input type="number" id="penNumber" placeholder="ระบุเลขคอก">

    <label>น้ำหนัก (กก.)</label>
    <input type="number" id="pigWeight" placeholder="0.00">

    <label>ปริมาณอาหาร (กก.)</label>
    <input type="number" id="feedAmount" placeholder="0.00">

    <label>สถานะสุขภาพ</label>
    <select id="pigStatus">
        <option value="ปกติ">ปกติ</option>
        <option value="ป่วย/อ่อนแอ">ป่วย/อ่อนแอ</option>
        <option value="รอตรวจซ้ำ">รอตรวจซ้ำ</option>
    </select>

    <label>บันทึกเพิ่มเติม</label>
    <textarea id="pigNote" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>

    <button onclick="saveData()">บันทึกข้อมูล</button>
</div>

<script>
// ตั้งค่าวันที่ปัจจุบัน
document.getElementById('checkDate').valueAsDate = new Date();

function saveData() {
    var date = document.getElementById('checkDate').value;
    var id = document.getElementById('pigID').value;
    var pen = document.getElementById('penNumber').value;
    var weight = document.getElementById('pigWeight').value;
    var feed = document.getElementById('feedAmount').value;
    var status = document.getElementById('pigStatus').value;
    var note = document.getElementById('pigNote').value;

    if (!id) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุเบอร์หูสุกร', 'warning');
        return;
    }

    Swal.fire({
        title: 'ยืนยันการบันทึก?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#28a745',
        cancelButtonColor: '#d33',
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({
                title: 'กำลังบันทึก...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            // ⚠️ วาง URL ของคุณที่ได้จากขั้นตอนการ Deploy ใหม่ลงในช่องด้านล่างนี้
            var scriptUrl = "https://script.google.com/macros/s/AKfycbxw9lVPL5UJQ8lGIzuI-_76aN6DWShUm3JRZxrHodbJThva4ptP0nYLRKR1vEdVRjD4/exec";
            
            var finalUrl = scriptUrl + 
                           "?date=" + encodeURIComponent(date) +
                           "&pigID=" + encodeURIComponent(id) +
                           "&penNumber=" + encodeURIComponent(pen) +
                           "&pigWeight=" + encodeURIComponent(weight) +
                           "&feedAmount=" + encodeURIComponent(feed) +
                           "&pigStatus=" + encodeURIComponent(status) +
                           "&note=" + encodeURIComponent(note);

            fetch(finalUrl, { mode: 'no-cors' }) // ใช้ no-cors เพื่อลดปัญหาการบล็อกของเบราว์เซอร์
                .then(() => {
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    // ล้างค่าช่องกรอก
                    document.getElementById('pigID').value = "";
                    document.getElementById('penNumber').value = "";
                    document.getElementById('pigWeight').value = "";
                    document.getElementById('feedAmount').value = "";
                    document.getElementById('pigNote').value = "";
                })
                .catch(error => {
                    Swal.fire('เกิดข้อผิดพลาด', 'กรุณาเช็คการเชื่อมต่ออินเทอร์เน็ต', 'error');
                });
        }
    });
}
</script>

</body>
</html>
